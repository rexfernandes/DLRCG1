<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notice Board · G1-A</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

        :root{
            --paper:#FAF8F4;
            --card:#FFFFFF;
            --ink:#23262B;
            --ink-soft:#6B7280;
            --ink-faint:#9CA3AF;
            --line:#E9E5DC;
            --accent:#3A6EA5;
            --accent-soft:#EAF0F7;
            --wah:#B8792E;
            --wah-soft:#FBF1E2;
        }
        html.dark{
            --paper:#14171C;
            --card:#1C2128;
            --ink:#EDEEF0;
            --ink-soft:#9AA2AD;
            --ink-faint:#6B7280;
            --line:#2A2F37;
            --accent:#6FA0D8;
            --accent-soft:#20304A;
            --wah:#E3A85B;
            --wah-soft:#3A2E1B;
        }

        *{ box-sizing:border-box; }
        body{
            font-family:'Inter',sans-serif;
            background:var(--paper);
            color:var(--ink);
            transition:background-color .25s ease, color .25s ease;
        }
        h1,h2,.serif{ font-family:'Lora',serif; }

        .no-scrollbar::-webkit-scrollbar{ display:none; }
        .no-scrollbar{ -ms-overflow-style:none; scrollbar-width:none; }

        .icon-btn{
            width:40px;height:40px;border-radius:12px;
            display:flex;align-items:center;justify-content:center;
            background:var(--card); border:1px solid var(--line);
            color:var(--ink-soft);
        }
        .icon-btn:hover{ color:var(--accent); }

        .nav-tab{
            position:relative; padding-bottom:10px; font-weight:600; font-size:.9rem;
            color:var(--ink-faint); transition:color .15s ease;
        }
        .nav-tab.active{ color:var(--accent); }
        .nav-tab.active::after{
            content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px;
            background:var(--accent); border-radius:2px;
        }

        .card{
            background:var(--card);
            border:1px solid var(--line);
            border-radius:18px;
        }

        /* Calendar-tile date picker */
        .date-tile{
            flex-shrink:0; width:58px; padding:8px 0 10px; border-radius:14px;
            border:1px solid var(--line); background:var(--card);
            display:flex; flex-direction:column; align-items:center; gap:2px;
            transition:all .15s ease; cursor:pointer;
        }
        .date-tile .wd{ font-size:.62rem; font-weight:700; letter-spacing:.06em; color:var(--ink-faint); text-transform:uppercase; }
        .date-tile .dn{ font-size:1.15rem; font-weight:700; color:var(--ink); font-family:'Lora',serif; }
        .date-tile .dot{ width:5px; height:5px; border-radius:50%; background:var(--wah); opacity:0; margin-top:1px; }
        .date-tile.has-wah .dot{ opacity:1; }
        .date-tile.selected{
            background:var(--accent); border-color:var(--accent);
            box-shadow:0 6px 14px -4px rgba(58,110,165,.4);
        }
        .date-tile.selected .wd, .date-tile.selected .dn{ color:#fff; }
        .date-tile.selected .dot{ background:#fff; }

        .eyebrow{
            font-size:.68rem; font-weight:800; letter-spacing:.09em; text-transform:uppercase;
            color:var(--ink-faint);
        }

        /* Subject entries */
        .entry{
            border-left:3px solid var(--entry-color, var(--accent));
            padding:2px 0 2px 14px;
        }
        .entry + .entry{ margin-top:16px; }
        .entry .label{
            font-size:.72rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
            color:var(--entry-color, var(--accent)); display:block; margin-bottom:3px;
        }
        .entry .body{
            font-size:.92rem; line-height:1.55; color:var(--ink);
        }

        .empty-note{
            font-size:.88rem; color:var(--ink-faint); font-style:italic;
        }

        .notice-item{
            padding:14px 0; border-bottom:1px solid var(--line);
        }
        .notice-item:last-child{ border-bottom:none; padding-bottom:0; }
        .notice-item:first-child{ padding-top:0; }
        .notice-item p{ font-size:.92rem; line-height:1.6; color:var(--ink); }

        .contact-card{
            display:flex; align-items:center; justify-content:space-between;
            padding:14px 16px; border-radius:16px;
        }
        .contact-card .name{ font-weight:700; font-size:.95rem; color:var(--ink); }
        .contact-card .subj{ font-size:.75rem; font-weight:600; color:var(--ink-soft); margin-top:1px; }
    </style>
</head>
<body class="pb-24">
    <div id="app" class="max-w-md mx-auto px-5 pt-8">

        <header class="flex justify-between items-start mb-7">
            <div>
                <h1 class="text-[1.7rem] font-semibold tracking-tight leading-tight">Notice Board</h1>
                <p class="text-xs font-semibold uppercase tracking-widest mt-1" style="color:var(--ink-faint)">G1-A Program Planning</p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleDarkMode()" class="icon-btn">
                    <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                    <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                </button>
                <button onclick="fetchData()" class="icon-btn">
                    <i data-lucide="refresh-cw" class="w-4 h-4" id="refresh-icon"></i>
                </button>
            </div>
        </header>

        <nav class="flex gap-7 mb-8 border-b" style="border-color:var(--line)">
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="nav-tab active">Dashboard</button>
            <button onclick="switchTab('contacts')" id="tab-contacts" class="nav-tab">Contacts</button>
            <button onclick="switchTab('notices')" id="tab-notices" class="nav-tab">Notices</button>
        </nav>

        <main id="main-content">
            <div id="loading" class="flex flex-col items-center justify-center py-24">
                <div class="w-9 h-9 border-[3px] rounded-full animate-spin mb-4" style="border-color:var(--line); border-top-color:var(--accent)"></div>
                <p class="text-sm font-medium" style="color:var(--ink-faint)">Loading today's schedule…</p>
            </div>

            <!-- DASHBOARD -->
            <div id="view-dashboard" class="hidden space-y-6">
                <div class="mb-2">
                    <div class="flex items-center justify-between mb-3 px-0.5">
                        <span class="eyebrow">Timeline</span>
                        <div class="flex items-center gap-3">
                            <span id="last-updated" class="text-[10px] font-semibold" style="color:var(--ink-faint)">—</span>
                            <button onclick="jumpToToday()" class="text-[11px] font-bold uppercase tracking-wide" style="color:var(--accent)">Today</button>
                        </div>
                    </div>
                    <div class="overflow-x-auto whitespace-nowrap no-scrollbar flex gap-2 pb-1" id="date-nav"></div>
                </div>

                <div class="flex items-baseline gap-2 px-0.5">
                    <h2 id="display-date" class="text-xl font-semibold serif">—</h2>
                </div>

                <section class="card p-5">
                    <div class="flex items-center gap-2 mb-4">
                        <div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:var(--wah-soft)">
                            <i data-lucide="home" class="w-3.5 h-3.5" style="color:var(--wah)"></i>
                        </div>
                        <span class="eyebrow">Work at Home</span>
                    </div>
                    <div id="wah-content"></div>
                </section>

                <section class="card p-5">
                    <div class="flex items-center gap-2 mb-4">
                        <div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:var(--accent-soft)">
                            <i data-lucide="book-open" class="w-3.5 h-3.5" style="color:var(--accent)"></i>
                        </div>
                        <span class="eyebrow">Today's Lessons</span>
                    </div>
                    <div id="lessons-content"></div>
                </section>
            </div>

            <!-- CONTACTS -->
            <div id="view-contacts" class="hidden space-y-3">
                <h2 class="text-lg font-semibold serif mb-3 px-0.5">Facilitator Contacts</h2>
                <div id="contacts-list" class="space-y-2.5"></div>
            </div>

            <!-- NOTICES -->
            <div id="view-notices" class="hidden">
                <h2 class="text-lg font-semibold serif mb-3 px-0.5">General Notices</h2>
                <div id="notices-list" class="card p-5"></div>
            </div>
        </main>

        <footer class="mt-12 text-center pb-4">
            <a href="https://docs.google.com/spreadsheets/d/1jQ1tURhBDGAgwiZl2dUnFMOP7-yUsekSrnVGSzQx9Lc/edit" target="_blank"
               class="text-[10px] font-bold uppercase tracking-widest hover:opacity-80" style="color:var(--ink-faint)">Source Spreadsheet</a>
        </footer>
    </div>

    <script>
        const SHEET_ID = '1jQ1tURhBDGAgwiZl2dUnFMOP7-yUsekSrnVGSzQx9Lc';
        const GID_DAILY = '1439989763';
        const GID_NOTICE = '502021398';

        // Subject mapping — each gets its own accent color, used as a left-border + label color
        const SUBJECTS = [
            { id: 'morningCircle',  label: 'Morning Circle',   color: '#3A6EA5' },
            { id: 'art',            label: 'Art',               color: '#8E5B9E' },
            { id: 'communityWork',  label: 'Community Work',   color: '#6F7A52' },
            { id: 'designLab',      label: 'Design Lab',       color: '#C0932E' },
            { id: 'english',        label: 'English',          color: '#4C4A8A' },
            { id: 'evlf',           label: 'EVLF',              color: '#B5556B' },
            { id: 'hindi',          label: 'Hindi',             color: '#A6532E' },
            { id: 'library',        label: 'Library',          color: '#2E8290' },
            { id: 'marathi',        label: 'Marathi',           color: '#7A5C8E' },
            { id: 'numeracy',       label: 'Numeracy',         color: '#4F7860' },
            { id: 'sports',         label: 'Sports',            color: '#B04A3A' },
            { id: 'thematics',      label: 'Thematics',        color: '#2C7DA0' }
        ];

        let dailyData = [];
        let noticeData = [];
        let contactData = [];
        let selectedDateStr = "";
        let currentTab = 'dashboard';

        // Dark mode is session-only (no persistence) — defaults to the system preference.
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }

        async function fetchData() {
            const icon = document.getElementById('refresh-icon');
            if (icon) icon.classList.add('animate-spin');

            try {
                const dailyUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_DAILY}`;
                const noticeUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_NOTICE}`;

                const [dailyRes, noticeRes] = await Promise.all([
                    fetch(dailyUrl).then(res => res.text()),
                    fetch(noticeUrl).then(res => res.text())
                ]);

                parseDailyData(dailyRes);
                parseNoticeAndContactData(noticeRes);

                document.getElementById('last-updated').innerText = 'Synced ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                renderApp();
            } catch (error) {
                console.error("Fetch error:", error);
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.innerHTML = `<p class="text-sm font-medium" style="color:var(--ink-faint)">Couldn't load the schedule. Check your connection and try again.</p>`;
                }
            } finally {
                if (icon) setTimeout(() => icon.classList.remove('animate-spin'), 500);
            }
        }

        function parseDailyData(csv) {
            const results = Papa.parse(csv, { header: false }).data;
            let currentDay = null;
            let processed = [];

            for (let i = 2; i < results.length; i++) { // Start from row 3 (index 2)
                const row = results[i];
                if (!row || row.length < 2) continue;

                const dateVal = row[0] ? row[0].trim() : "";
                const component = row[1] ? row[1].trim() : "";

                if (dateVal && dateVal.toLowerCase() !== 'date' && dateVal.toLowerCase() !== 'component') {
                    currentDay = dateVal;
                }

                if (currentDay && component) {
                    processed.push({
                        date: currentDay,
                        component: component,
                        morningCircle: row[2] || "",
                        art: row[3] || "",
                        communityWork: row[4] || "",
                        designLab: row[5] || "",
                        english: row[6] || "",
                        evlf: row[7] || "",
                        hindi: row[8] || "",
                        library: row[9] || "",
                        marathi: row[10] || "",
                        numeracy: row[11] || "",
                        sports: row[12] || "",
                        thematics: row[13] || ""
                    });
                }
            }

            const grouped = {};
            processed.forEach(item => {
                if (!grouped[item.date]) grouped[item.date] = [];
                grouped[item.date].push(item);
            });

            const parseDate = (str) => {
                try {
                    // Expecting format like "Fri, 17 Jul" or "Fri, 17 Jul 2026"
                    const parts = str.split(',')[1].trim().split(' ');
                    const day = parseInt(parts[0]);
                    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                    const month = monthNames.indexOf(parts[1]);
                    return new Date(2026, month, day);
                } catch(e) { return new Date(0); }
            };

            const sortedDates = Object.keys(grouped).sort((a, b) => parseDate(a) - parseDate(b));

            dailyData = sortedDates.map(date => ({
                date: date,
                timestamp: parseDate(date),
                entries: grouped[date],
                hasWAH: grouped[date].some(e => e.component.toLowerCase().includes('wah') && SUBJECTS.some(s => e[s.id] && e[s.id].trim()))
            }));

            if (!selectedDateStr) {
                jumpToToday(false);
            }
        }

        function parseNoticeAndContactData(csv) {
            const results = Papa.parse(csv, { header: false }).data;
            let notices = [];
            let contacts = [];
            let isContactSection = false;

            results.forEach(row => {
                const text = row.filter(c => c && c.trim()).join(" ").trim();
                if (!text) return;

                // Detect contact section
                if (text.toLowerCase().includes("email addresses") || (text.toLowerCase().includes("names") && text.toLowerCase().includes("subjects"))) {
                    isContactSection = true;
                    return;
                }

                if (isContactSection) {
                    // Extract contact row
                    if (row.length >= 3 && row[2] && row[2].includes("@")) {
                        contacts.push({ name: row[0], subject: row[1], email: row[2] });
                    }
                } else {
                    // Extract notice
                    if (!text.toLowerCase().includes("class notice board") && text.length > 10) {
                        notices.push(text);
                    }
                }
            });
            noticeData = notices;
            contactData = contacts;
        }

        function switchTab(tab) {
            currentTab = tab;
            ['dashboard', 'contacts', 'notices'].forEach(t => {
                const view = document.getElementById(`view-${t}`);
                const tabBtn = document.getElementById(`tab-${t}`);
                if (view) view.classList.toggle('hidden', t !== tab);
                if (tabBtn) tabBtn.classList.toggle('active', t === tab);
            });
            renderApp();
        }

        function jumpToToday(shouldRender = true) {
            const now = new Date();
            now.setHours(0,0,0,0);

            let closest = dailyData[0];
            let minDiff = Infinity;
            dailyData.forEach(d => {
                const diff = Math.abs(d.timestamp - now);
                if (diff < minDiff) {
                    minDiff = diff;
                    closest = d;
                }
            });

            if (closest) {
                selectedDateStr = closest.date;
                if (shouldRender) {
                    switchTab('dashboard');
                    renderApp();
                }
            }
        }

        function renderApp() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById(`view-${currentTab}`).classList.remove('hidden');
            if (currentTab === 'dashboard') {
                renderDateNav();
                updateDashboardDisplay();
            } else if (currentTab === 'contacts') {
                renderContacts();
            } else if (currentTab === 'notices') {
                renderNotices();
            }
            lucide.createIcons();
        }

        function renderDateNav() {
            const nav = document.getElementById('date-nav');
            if (!nav) return;
            nav.innerHTML = "";
            dailyData.forEach(day => {
                const isActive = day.date === selectedDateStr;
                const wd = day.timestamp.toLocaleDateString('en-GB', { weekday: 'short' });
                const dn = day.timestamp.getDate();

                const btn = document.createElement('button');
                btn.className = `date-tile ${isActive ? 'selected' : ''} ${day.hasWAH ? 'has-wah' : ''}`;
                btn.innerHTML = `<span class="wd">${wd}</span><span class="dn">${dn}</span><span class="dot"></span>`;
                btn.onclick = () => {
                    selectedDateStr = day.date;
                    renderDateNav();
                    updateDashboardDisplay();
                };
                nav.appendChild(btn);
            });
            const activeBtn = nav.querySelector('.selected');
            if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        function updateDashboardDisplay() {
            const day = dailyData.find(d => d.date === selectedDateStr);
            const displayDate = document.getElementById('display-date');
            if (displayDate) {
                displayDate.innerText = day
                    ? day.timestamp.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' })
                    : selectedDateStr;
            }
            if (!day) return;

            const wah = day.entries.find(e => e.component.toLowerCase().includes('wah'));
            const lesson = day.entries.find(e => e.component.toLowerCase().includes('lesson'));

            const buildEntries = (row) => {
                if (!row) return "";
                let html = "";
                SUBJECTS.forEach(sub => {
                    const val = row[sub.id];
                    if (val && val.trim()) {
                        html += `
                            <div class="entry" style="--entry-color:${sub.color}">
                                <span class="label">${sub.label}</span>
                                <p class="body">${val}</p>
                            </div>`;
                    }
                });
                return html;
            };

            const wahContainer = document.getElementById('wah-content');
            if (wahContainer) {
                wahContainer.innerHTML = buildEntries(wah) || `<p class="empty-note">No work-at-home tasks for this date.</p>`;
            }

            const lessonContainer = document.getElementById('lessons-content');
            if (lessonContainer) {
                lessonContainer.innerHTML = buildEntries(lesson) || `<p class="empty-note">No lesson details for this date.</p>`;
            }
        }

        function renderContacts() {
            const list = document.getElementById('contacts-list');
            if (!list) return;
            list.innerHTML = contactData.length === 0
                ? `<p class="empty-note p-4">The contact list is empty.</p>`
                : contactData.map(c => `
                    <div class="card contact-card">
                        <div>
                            <div class="name">${c.name}</div>
                            <div class="subj">${c.subject}</div>
                        </div>
                        <a href="mailto:${c.email}" class="icon-btn" style="width:36px;height:36px">
                            <i data-lucide="mail" class="w-4 h-4"></i>
                        </a>
                    </div>
                `).join('');
        }

        function renderNotices() {
            const list = document.getElementById('notices-list');
            if (!list) return;
            list.innerHTML = noticeData.length === 0
                ? `<p class="empty-note">No active notices.</p>`
                : noticeData.map(n => `<div class="notice-item"><p>${n}</p></div>`).join('');
        }

        fetchData();
    </script>
</body>
</html>
